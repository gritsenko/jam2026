<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1a0f0a" />
    <title>Synergy Grid TD</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: radial-gradient(circle at 50% 35%, #3a2415 0%, #1a0f0a 70%, #0d0705 100%);
        /* Disable mobile gestures / pull-to-refresh / double-tap zoom on the play area. */
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #app,
      #app canvas {
        display: block;
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      /* Loading splash shown before Pixi mounts (and while assets load). */
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        font-family: system-ui, sans-serif;
        color: #c79a5b;
        pointer-events: none;
        transition: opacity 0.45s ease;
      }
      #boot.boot-hidden {
        opacity: 0;
      }
      .boot-logo {
        width: 300px;
        max-width: 64vw;
        height: auto;
        filter: drop-shadow(0 8px 22px rgba(0, 0, 0, 0.5));
        /* Fade + ease in so the splash never looks frozen on the first paint. */
        animation: boot-logo-in 0.55s ease-out both;
      }
      @keyframes boot-logo-in {
        from {
          opacity: 0;
          transform: scale(0.92);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-logo {
          animation: none;
        }
      }
      .boot-track {
        position: relative;
        width: 180px;
        max-width: 56vw;
        height: 5px;
        border-radius: 3px;
        background: rgba(199, 154, 91, 0.16);
        overflow: hidden;
      }
      .boot-fill {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 0%;
        border-radius: 3px;
        background: linear-gradient(90deg, #c79a5b, #f0c071);
        box-shadow: 0 0 8px rgba(240, 192, 113, 0.6);
        transition: width 0.25s ease;
      }
      /* Until real progress arrives, slide a partial bar so it never looks frozen. */
      .boot-track.boot-indeterminate .boot-fill {
        width: 35%;
        transition: none;
        animation: boot-indeterminate 1.1s ease-in-out infinite;
      }
      @keyframes boot-indeterminate {
        0% {
          left: -35%;
        }
        100% {
          left: 100%;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .boot-track.boot-indeterminate .boot-fill {
          animation: none;
          width: 100%;
          opacity: 0.5;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="boot">
      <img class="boot-logo" src="assets/sprites/loader.png" alt="Buhanka 3000 — Tower Defense" />
      <div class="boot-track boot-indeterminate"><div class="boot-fill"></div></div>
    </div>
    <script>
      /* Boot-splash progress bridge, available before the module bundle loads so
         the bar animates during the initial JS download/parse on slow mobiles. */
      (function () {
        var boot = document.getElementById('boot');
        var track = boot && boot.querySelector('.boot-track');
        var fill = boot && boot.querySelector('.boot-fill');
        var current = 0;
        window.__boot = {
          set: function (percent) {
            if (!fill || !track) return;
            var p = Math.max(0, Math.min(100, percent));
            if (p <= current) return; // monotonic — never jump backwards
            current = p;
            track.classList.remove('boot-indeterminate');
            fill.style.width = p + '%';
          },
          done: function () {
            if (!boot) return;
            this.set(100);
            boot.classList.add('boot-hidden');
            setTimeout(function () {
              if (boot && boot.parentNode) boot.parentNode.removeChild(boot);
            }, 500);
          },
        };
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
